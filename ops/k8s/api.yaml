apiVersion: apps/v1
kind: Deployment
metadata:
  name: murgdur-api
spec:
  replicas: 8
  selector:
    matchLabels: { app: murgdur-api }
  template:
    metadata:
      labels: { app: murgdur-api }
    spec:
      containers:
        - name: api
          image: ghcr.io/murgdur/api:latest
          ports: [{ containerPort: 4000 }]
          envFrom:
            - secretRef: { name: murgdur-secrets }
          resources:
            requests: { cpu: "500m", memory: "512Mi" }
            limits: { cpu: "1500m", memory: "1Gi" }
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: murgdur-api
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: murgdur-api
  minReplicas: 8
  maxReplicas: 100
  metrics:
    - type: Resource
      resource:
        name: cpu
        target: { type: Utilization, averageUtilization: 60 }
