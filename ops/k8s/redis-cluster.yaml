apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis-cluster
spec:
  serviceName: redis-cluster
  replicas: 6
  selector:
    matchLabels: { app: redis-cluster }
  template:
    metadata:
      labels: { app: redis-cluster }
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          command: ["redis-server", "--cluster-enabled", "yes", "--appendonly", "yes"]
          ports: [{ containerPort: 6379 }]
