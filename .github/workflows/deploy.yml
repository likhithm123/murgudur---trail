name: build-and-deploy

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
   steps:
  - uses: actions/checkout@v4

  - uses: docker/setup-buildx-action@v3

  - uses: docker/login-action@v3
    with:
      registry: ghcr.io
      username: ${{ github.actor }}
      password: ${{ github.token }}

  - run: docker build -f ops/docker/Dockerfile.web -t ghcr.io/likhithm123/web:${{ github.sha }} .

  - run: docker build -f ops/docker/Dockerfile.api -t ghcr.io/likhithm123/api:${{ github.sha }} .

  - run: docker push ghcr.io/likhithm123/web:${{ github.sha }}

  - run: docker push ghcr.io/likhithm123/api:${{ github.sha }}
